<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e2937;
        }
        
        .container {
            text-align: center;
            max-width: 460px;
            padding: 40px 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        
        .spinner {
            width: 56px;
            height: 56px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin: 0 auto 28px;
        }
        
        h2 {
            margin: 0 0 12px 0;
            font-size: 21px;
            font-weight: 500;
        }
        
        p {
            color: #64748b;
            font-size: 15.5px;
            line-height: 1.5;
            margin: 0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Checking your browser before accessing next page.</h2>
        <p>Please wait for up to 5 seconds...</p>
    </div>

    <script>
        // Check if user has visited before using cookie
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        const hasVisited = getCookie('redirect_visited');

        if (hasVisited) {
            // Instant redirect for returning users
            redirectNow();
        } else {
            // First time: 5 second delay + set cookie
            setTimeout(() => {
                redirectNow();
            }, 3500);
        }

        function redirectNow() {
            const targetBase = "https://search.docfast.xyz";
            const urlParams = new URLSearchParams(window.location.search);
            
            let finalUrl = targetBase;
            if (urlParams.toString()) {
                finalUrl += "?" + urlParams.toString();
            }
            
            // Set cookie for 30 days
            document.cookie = "redirect_visited=true; max-age=2592000; path=/";
            
            window.location.replace(finalUrl);
        }
    </script>
</body>
</html>
